name: Sync to Hugging Face Space

on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Hugging Face with LFS
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Bersihkan riwayat git lama
          rm -rf .git
          
          # 2. Inisialisasi ulang dengan branch 'main' secara eksplisit
          git init -b main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 3. Aktifkan Git LFS untuk menangani file gambar/zip (agar tidak ditolak HF)
          git lfs install
          git lfs track "*.png" "*.jpg" "*.jpeg" "*.zip" "*.ttf" "*.mp4"
          
          # 4. Tambahkan file .gitattributes yang dibuat oleh LFS
          git add .gitattributes
          
          # 5. Commit dan Push paksa ke Hugging Face
          git add .
          git commit -m "Auto-sync via GitHub Actions"
          git push --force https://raffxs:$HF_TOKEN@huggingface.co/spaces/raffxs/brat main
